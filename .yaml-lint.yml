---
extends: default

rules:
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  comments:
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: true
  line-length:
    max: 120
    level: warning
  document-start: disable
  truthy:
    check-keys: false

ignore: |
  node_modules/
  dist/
  coverage/
  .github/
