name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci --legacy-peer-deps

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Build
        id: npm-package
        run: npm run package

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from ref or tags
        id: version
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Using version from release branch: ${BASH_REMATCH[1]}"
            echo "tag=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "No version tags found matching vx.y.z pattern and branch '$BRANCH_NAME' is not release/vx.y.z"
            exit 1
          fi
          echo "Using latest version tag: $latest"
          echo "tag=$latest" >> "$GITHUB_OUTPUT"

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          repository-path: .
          version: v0, v0.0
            ${{ steps.version.outputs.tag }}
